scenarios:
  - name: classification_recommend_validate_explain_export
    task: classification
    intensity: low
    targets: ["image"]
    export_format: json
    preview: false

  - name: preview_lifecycle
    task: classification
    intensity: low
    targets: ["image"]
    export_format: python
    preview: true
    variants_per_image: 1

  - name: preview_batch_compare
    task: classification
    intensity: low
    targets: ["image"]
    export_format: json
    preview: true
    preview_tool: render_preview_batch
    compare_preview: true
    input_count: 2
    variants_per_image: 1
    feedback_tags: ["too_noisy"]

  - name: preview_quality_tuning_summary
    task: classification
    intensity: low
    targets: ["image"]
    export_format: json
    preview: true
    preview_tool: render_preview_batch
    compare_preview: true
    assert_quality_summary: true
    summarize_tuning_session: true
    rank_preview_candidates: true
    record_tuning_decision: true
    export_tuning_report: true
    quality_profile: ocr
    accepted: true
    input_count: 2
    variants_per_image: 1
    feedback_tags: ["too_noisy:high"]
    alternate_feedback_tags: ["too_blurry:low"]
