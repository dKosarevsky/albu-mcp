scenarios:
  - name: client_smoke_resource_flow
    task: classification
    intensity: low
    targets: ["image"]
    export_format: json
    preview: false
    client_smoke: true
    host_smoke: true
    smoke_resources:
      - albumentationsx://examples/client-smoke
      - albumentationsx://capabilities
      - albumentationsx://recipes/catalog

  - name: diagnostics_resource_flow
    task: classification
    intensity: low
    targets: ["image"]
    export_format: json
    preview: false
    diagnostics_smoke: true
    diagnostics_resources:
      - albumentationsx://diagnostics/guide
      - albumentationsx://capabilities

  - name: classification_recommend_validate_explain_export
    task: classification
    intensity: low
    targets: ["image"]
    export_format: json
    preview: false

  - name: preview_lifecycle
    task: classification
    intensity: low
    targets: ["image"]
    export_format: python
    preview: true
    variants_per_image: 1

  - name: preview_batch_compare
    task: classification
    intensity: low
    targets: ["image"]
    export_format: json
    preview: true
    preview_tool: render_preview_batch
    compare_preview: true
    input_count: 2
    variants_per_image: 1
    feedback_tags: ["too_noisy"]

  - name: preview_quality_tuning_summary
    task: classification
    intensity: low
    targets: ["image"]
    export_format: json
    preview: true
    preview_tool: render_preview_batch
    compare_preview: true
    assert_quality_summary: true
    summarize_tuning_session: true
    rank_preview_candidates: true
    score_dataset_preview_candidates: true
    record_preview_feedback: true
    feedback_image_index: 7
    feedback_variant_index: 0
    preview_feedback_note: "example 8 is too noisy"
    record_tuning_decision: true
    export_tuning_report: true
    export_preview_report: true
    preview_report_format: html
    recommend_recipe: true
    assert_recipe_explanations: true
    assert_preview_report_images: true
    assert_preview_report_feedback: true
    recipe_task: ocr
    expected_recipe_profile: ocr
    quality_profile: ocr
    accepted: true
    input_count: 8
    variants_per_image: 1
    feedback_tags: ["too_noisy:high"]
    alternate_feedback_tags: ["too_blurry:low"]

  - name: real_sample_preview_smoke
    task: classification
    intensity: low
    targets: ["image"]
    export_format: json
    preview: false
    real_sample_smoke: true
    input_count: 3
    variants_per_image: 1
    seed: 271
    max_side: 160
    compare_preview: true
    assert_quality_summary: true
    feedback_tags: ["too_noisy:low"]
