name: MCP Registry Watchdog

on:
  workflow_dispatch:
  schedule:
    - cron: "17 6 * * *"

permissions:
  contents: read

jobs:
  check:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v5

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.13"

      - name: Check MCP Registry latest metadata
        run: python scripts/check_mcp_registry_status.py --retries 3 --retry-delay 15 --timeout 90
