name: CI

on:
  pull_request:
  push:
    branches: ["main"]

jobs:
  ui:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v5

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "24"
          cache: npm
          cache-dependency-path: mcp-app/package-lock.json

      - name: Install MCP App dependencies
        run: npm --prefix mcp-app ci

      - name: Run MCP App tests
        run: npm --prefix mcp-app run test

      - name: Check MCP App types
        run: npm --prefix mcp-app run typecheck

      - name: Check MCP App formatting
        run: npm --prefix mcp-app run format:check

      - name: Build MCP App
        run: npm --prefix mcp-app run build

      - name: Check committed MCP App bundle
        run: git diff --exit-code -- src/albumentationsx_mcp/ui/preview-review.html

  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12", "3.13"]

    steps:
      - name: Check out repository
        uses: actions/checkout@v5

      - name: Install uv
        uses: astral-sh/setup-uv@v7
        with:
          enable-cache: false

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: uv sync --all-extras --dev

      - name: Run tests
        run: uv run pytest

      - name: Run Ruff lint
        run: uv run ruff check .

      - name: Check formatting
        run: uv run ruff format --check .

      - name: Run ty
        run: uv run ty check

      - name: Guard evidence templates
        run: >
          uv run albu-mcp evidence template-guard
          --host-manifest docs/operator-packets/codex-evidence-session-manifest.json
          --host-manifest docs/operator-packets/claude-code-evidence-session-manifest.json
          --beta-dir docs/beta-response-templates
          --strict
          --format json

      - name: Validate host manual run records
        run: uv run python scripts/validate_host_manual_runs.py

      - name: Check host acceptance evidence
        run: uv run python scripts/check_host_acceptance_report.py

      - name: Check contract snapshots
        run: uv run python scripts/check_contract_snapshots.py

      - name: Check demo assets
        run: uv run python scripts/check_demo_assets.py --output-dir docs/assets/demo --check

      - name: Check release readiness
        run: uv run python scripts/check_release_readiness.py

      - name: Run golden MCP evals
        run: uv run python scripts/run_golden_evals.py --work-dir .golden-evals

      - name: Build package
        run: uv build

      - name: Check packaged MCP App
        run: uv run python scripts/check_mcp_app_bundle.py --dist-dir dist

      - name: MCP stdio smoke
        run: |
          uv run python - <<'PY'
          import asyncio
          from mcp import ClientSession, StdioServerParameters
          from mcp.client.stdio import stdio_client

          async def main() -> None:
              params = StdioServerParameters(
                  command="uv",
                  args=["run", "albumentationsx-mcp"],
                  cwd=".",
              )
              async with stdio_client(params) as (read, write):
                  async with ClientSession(read, write) as session:
                      await session.initialize()
                      tools = await session.list_tools()
                      assert "render_preview" in {tool.name for tool in tools.tools}

          asyncio.run(main())
          PY
