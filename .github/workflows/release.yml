name: Release

on:
  push:
    tags: ["v*"]

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v5

      - name: Install uv
        uses: astral-sh/setup-uv@v7
        with:
          enable-cache: false

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.13"

      - name: Install dependencies
        run: uv sync --all-extras --dev

      - name: Check release version metadata
        run: uv run python scripts/check_release_version.py "${GITHUB_REF_NAME}"

      - name: Run tests
        run: uv run pytest

      - name: Run Ruff lint
        run: uv run ruff check .

      - name: Check formatting
        run: uv run ruff format --check .

      - name: Run ty
        run: uv run ty check

      - name: Run golden MCP evals
        run: uv run python scripts/run_golden_evals.py --work-dir .golden-evals

      - name: Build package
        run: uv build

      - name: Upload package artifacts
        uses: actions/upload-artifact@v7
        with:
          name: dist
          path: dist/*
          if-no-files-found: error

  publish-pypi:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: pypi
      url: https://pypi.org/project/albumentationsx-mcp/
    permissions:
      contents: read
      id-token: write

    steps:
      - name: Check out repository
        uses: actions/checkout@v5

      - name: Install uv
        uses: astral-sh/setup-uv@v7
        with:
          enable-cache: false

      - name: Download package artifacts
        uses: actions/download-artifact@v8
        with:
          name: dist
          path: dist

      - name: Publish package to PyPI
        run: uv publish --trusted-publishing automatic dist/*

  github-release:
    needs: publish-pypi
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Check out repository
        uses: actions/checkout@v5

      - name: Download package artifacts
        uses: actions/download-artifact@v8
        with:
          name: dist
          path: dist

      - name: Create GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh release create "${GITHUB_REF_NAME}" dist/* --verify-tag --generate-notes

  post-release-smoke:
    needs: github-release
    runs-on: ubuntu-latest

    steps:
      - name: Install uv
        uses: astral-sh/setup-uv@v7
        with:
          enable-cache: false

      - name: Smoke published package
        run: uvx --from "albumentationsx-mcp==${GITHUB_REF_NAME#v}" albumentationsx-mcp --help
