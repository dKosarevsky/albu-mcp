name: Release

on:
  push:
    tags: ["v*"]

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v5

      - name: Install uv
        uses: astral-sh/setup-uv@v7
        with:
          enable-cache: false

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.13"

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "24"
          cache: npm
          cache-dependency-path: mcp-app/package-lock.json

      - name: Install dependencies
        run: uv sync --all-extras --dev

      - name: Install MCP App dependencies
        run: npm --prefix mcp-app ci

      - name: Run MCP App tests
        run: npm --prefix mcp-app run test

      - name: Check MCP App types
        run: npm --prefix mcp-app run typecheck

      - name: Check MCP App formatting
        run: npm --prefix mcp-app run format:check

      - name: Build MCP App
        run: npm --prefix mcp-app run build

      - name: Check committed MCP App bundle
        run: git diff --exit-code -- src/albumentationsx_mcp/ui/preview-review.html

      - name: Check release version metadata
        run: uv run python scripts/check_release_version.py "${GITHUB_REF_NAME}"

      - name: Validate Claude Desktop extension
        run: uv run python scripts/check_desktop_extension.py

      - name: Validate release notes
        run: python scripts/extract_release_notes.py --tag "${GITHUB_REF_NAME}" --output release-notes.md

      - name: Run tests
        run: uv run pytest

      - name: Run Ruff lint
        run: uv run ruff check .

      - name: Check formatting
        run: uv run ruff format --check .

      - name: Run ty
        run: uv run ty check

      - name: Validate host manual run records
        run: uv run python scripts/validate_host_manual_runs.py

      - name: Check host acceptance evidence
        run: uv run python scripts/check_host_acceptance_report.py

      - name: Check contract snapshots
        run: uv run python scripts/check_contract_snapshots.py

      - name: Check demo assets
        run: uv run python scripts/check_demo_assets.py --output-dir docs/assets/demo --check

      - name: Check release readiness
        run: uv run python scripts/check_release_readiness.py --tag "${GITHUB_REF_NAME}"

      - name: Run golden MCP evals
        run: uv run python scripts/run_golden_evals.py --work-dir .golden-evals

      - name: Build package
        run: uv build

      - name: Check packaged MCP App
        run: uv run python scripts/check_mcp_app_bundle.py --dist-dir dist

      - name: Build Claude Desktop extension
        run: uv run python -m scripts.build_desktop_extension --output-dir dist/mcpb

      - name: Add stable Claude Desktop extension alias
        run: cp "dist/mcpb/albumentationsx-mcp-${GITHUB_REF_NAME#v}.mcpb" dist/mcpb/albumentationsx-mcp.mcpb

      - name: Write MCPB checksum
        run: cd dist/mcpb && sha256sum *.mcpb > SHA256SUMS

      - name: Upload package artifacts
        uses: actions/upload-artifact@v7
        with:
          name: dist
          path: |
            dist/*.whl
            dist/*.tar.gz
          if-no-files-found: error

      - name: Upload Claude Desktop extension
        uses: actions/upload-artifact@v7
        with:
          name: mcpb
          path: dist/mcpb/*
          if-no-files-found: error

      - name: Upload release notes
        uses: actions/upload-artifact@v7
        with:
          name: release-notes
          path: release-notes.md
          if-no-files-found: error

  publish-pypi:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: pypi
      url: https://pypi.org/project/albumentationsx-mcp/
    permissions:
      contents: read
      id-token: write

    steps:
      - name: Check out repository
        uses: actions/checkout@v5

      - name: Install uv
        uses: astral-sh/setup-uv@v7
        with:
          enable-cache: false

      - name: Download package artifacts
        uses: actions/download-artifact@v8
        with:
          name: dist
          path: dist

      - name: Publish package to PyPI
        run: uv publish --trusted-publishing automatic dist/*

  github-release:
    needs: publish-pypi
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Check out repository
        uses: actions/checkout@v5

      - name: Download package artifacts
        uses: actions/download-artifact@v8
        with:
          name: dist
          path: dist/python

      - name: Download Claude Desktop extension
        uses: actions/download-artifact@v8
        with:
          name: mcpb
          path: dist/mcpb

      - name: Download release notes
        uses: actions/download-artifact@v8
        with:
          name: release-notes
          path: .

      - name: Create GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          release_flags=()
          if [[ "${GITHUB_REF_NAME}" == *-* ]]; then
            release_flags=(--prerelease --latest=false)
          fi
          gh release create "${GITHUB_REF_NAME}" dist/python/* dist/mcpb/* \
            --verify-tag "${release_flags[@]}" --notes-file release-notes.md

  post-release-smoke:
    needs: github-release
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v5

      - name: Install uv
        uses: astral-sh/setup-uv@v7
        with:
          enable-cache: false

      - name: Smoke published package
        run: python scripts/check_published_package_smoke.py --version "${GITHUB_REF_NAME#v}"

  publish-mcp-registry:
    needs: post-release-smoke
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write

    steps:
      - name: Check out repository
        uses: actions/checkout@v5

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.13"

      - name: Install mcp-publisher
        run: |
          curl -L "https://github.com/modelcontextprotocol/registry/releases/latest/download/mcp-publisher_$(uname -s | tr '[:upper:]' '[:lower:]')_$(uname -m | sed 's/x86_64/amd64/;s/aarch64/arm64/').tar.gz" | tar xz mcp-publisher

      - name: Authenticate to MCP Registry
        run: ./mcp-publisher login github-oidc

      - name: Publish metadata to MCP Registry
        run: |
          set +e
          ./mcp-publisher publish 2>&1 | tee mcp-publisher.log
          status=${PIPESTATUS[0]}
          set -e
          if [ "$status" -ne 0 ]; then
            if grep -q "cannot publish duplicate version" mcp-publisher.log; then
              echo "MCP Registry already has this version; continuing to verification."
            else
              exit "$status"
            fi
          fi

      - name: Verify MCP Registry metadata
        run: python scripts/check_mcp_registry_status.py --retries 3 --retry-delay 15 --timeout 90
