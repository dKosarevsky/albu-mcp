name: Publish MCP Registry Metadata

on:
  workflow_dispatch:

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write

    steps:
      - name: Check out repository
        uses: actions/checkout@v5

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.13"

      - name: Install mcp-publisher
        run: |
          curl -L "https://github.com/modelcontextprotocol/registry/releases/latest/download/mcp-publisher_$(uname -s | tr '[:upper:]' '[:lower:]')_$(uname -m | sed 's/x86_64/amd64/;s/aarch64/arm64/').tar.gz" | tar xz mcp-publisher

      - name: Authenticate to MCP Registry
        run: ./mcp-publisher login github-oidc

      - name: Publish metadata to MCP Registry
        run: |
          set +e
          ./mcp-publisher publish 2>&1 | tee mcp-publisher.log
          status=${PIPESTATUS[0]}
          set -e
          if [ "$status" -ne 0 ]; then
            if grep -q "cannot publish duplicate version" mcp-publisher.log; then
              echo "MCP Registry already has this version; continuing to verification."
            else
              exit "$status"
            fi
          fi

      - name: Verify MCP Registry metadata
        run: python scripts/check_mcp_registry_status.py --retries 3 --retry-delay 15 --timeout 90
